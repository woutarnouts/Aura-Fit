    <!DOCTYPE html>
<html>
<head>
  <meta charset='utf-8'>
  <title>AuraShirts - Varianten</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f7f7f7; }
    header { background: white; padding: 20px; text-align: center; border-bottom: 1px solid #ddd; }
    nav a { margin: 0 10px; color: #1e3a8a; text-decoration: none; }
    .container { max-width: 1000px; margin: auto; padding: 30px; }
    h2 { text-align: center; color: #1e3a8a; margin-bottom: 30px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      text-align: center;
      transition: transform 0.2s;
    }

    .card:hover { transform: translateY(-4px); }

    .card-header {
      padding: 14px;
      color: white;
      font-weight: bold;
      font-size: 1.1em;
    }

    .card img {
      width: 100%;
      height: 240px;
      object-fit: contain;
      display: block;
      padding: 10px;
      box-sizing: border-box;
      background: #f0f0f0;
    }

    .card-body {
      padding: 16px;
    }

    .card-body .price {
      font-size: 1.3em;
      font-weight: bold;
      margin-top: 6px;
    }

    /* Kleuren per shirt */
    .grijs .card-header { background: #4b5563; }
    .blauw .card-header { background: #0284c7; }
    .geel  .card-header { background: #ca8a04; }

    .grijs .price { color: #4b5563; }
    .blauw .price { color: #0284c7; }
    .geel  .price { color: #ca8a04; }

    .grijs { border-top: 4px solid #4b5563; }
    .blauw { border-top: 4px solid #0284c7; }
    .geel  { border-top: 4px solid #ca8a04; }
  </style>
</head>
<body>

<header>
  <h1>AuraShirts</h1>
  <nav><a href='index.html'>← Terug naar home</a></nav>
</header>

<div class='container'>
  <h2>Varianten</h2>
  <div class='grid'>

    <div class='card grijs'>
      <div class='card-header'>Grijs</div>
      <img src='images/shirt_grijs.png' alt='Grijs shirt'>
      <div class='card-body'>
        <div class='price'>€12,50</div>
      </div>
    </div>

    <div class='card blauw'>
      <div class='card-header'>Blauw</div>
      <img src='images/shirt_blauw.png' alt='Blauw shirt'>
      <div class='card-body'>
        <div class='price'>€12,50</div>
      </div>
    </div>

    <div class='card geel'>
      <div class='card-header'>Geel</div>
      <img src='images/shirt_geel.png' alt='Geel shirt'>
      <div class='card-body'>
        <div class='price'>€12,50</div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
