<!DOCTYPE html>
<html>
<head>
  <meta charset='utf-8'>
  <title>AuraShoes - Varianten</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f7f7f7; }
    header { background: white; padding: 20px; text-align: center; border-bottom: 1px solid #ddd; }
    nav a { margin: 0 10px; color: #1e3a8a; text-decoration: none; }
    .container { max-width: 1200px; margin: auto; padding: 30px; }
    h2 { text-align: center; color: #1e3a8a; margin-bottom: 30px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      text-align: center;
      transition: transform 0.2s;
    }

    .card:hover { transform: translateY(-4px); }

    .card-header {
      padding: 14px;
      color: white;
      font-weight: bold;
      font-size: 1.1em;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: contain;
      display: block;
      padding: 12px;
      box-sizing: border-box;
      background: #f5f5f5;
    }

    .card-body {
      padding: 16px;
    }

    .card-body .price {
      font-size: 1.3em;
      font-weight: bold;
      margin-top: 6px;
    }

    .loopschoenen { border-top: 4px solid #6b7280; }
    .volleybal    { border-top: 4px solid #ca8a04; }
    .tennis       { border-top: 4px solid #16a34a; }
    .voetbal      { border-top: 4px solid #e11d48; }
    .basketbal    { border-top: 4px solid #ea580c; }
    .honkbal      { border-top: 4px solid #1e3a8a; }

    .loopschoenen .card-header { background: #6b7280; }
    .volleybal    .card-header { background: #ca8a04; }
    .tennis       .card-header { background: #16a34a; }
    .voetbal      .card-header { background: #e11d48; }
    .basketbal    .card-header { background: #ea580c; }
    .honkbal      .card-header { background: #1e3a8a; }

    .loopschoenen .price { color: #6b7280; }
    .volleybal    .price { color: #ca8a04; }
    .tennis       .price { color: #16a34a; }
    .voetbal      .price { color: #e11d48; }
    .basketbal    .price { color: #ea580c; }
    .honkbal      .price { color: #1e3a8a; }
  </style>
</head>
<body>

<header>
  <h1>AuraShoes</h1>
  <nav><a href='index.html'>← Terug naar home</a></nav>
</header>

<div class='container'>
  <h2>Varianten</h2>
  <div class='grid'>

    <div class='card loopschoenen'>
      <div class='card-header'>Loopschoenen</div>
      <img src='images/schoen_loop.png' alt='Loopschoenen'>
      <div class='card-body'>
        <div class='price'>€40,00</div>
      </div>
    </div>

    <div class='card volleybal'>
      <div class='card-header'>Volleybal</div>
      <img src='images/schoen_volleybal.png' alt='Volleybalschoenen'>
      <div class='card-body'>
        <div class='price'>€45,00</div>
      </div>
    </div>

    <div class='card tennis'>
      <div class='card-header'>Tennis</div>
      <img src='images/schoen_tennis.png' alt='Tennisschoenen'>
      <div class='card-body'>
        <div class='price'>€50,00</div>
      </div>
    </div>

    <div class='card voetbal'>
      <div class='card-header'>Voetbal</div>
      <img src='images/schoen_voetbal.png' alt='Voetbalschoenen'>
      <div class='card-body'>
        <div class='price'>€60,00</div>
      </div>
    </div>

    <div class='card basketbal'>
      <div class='card-header'>Basketbal</div>
      <img src='images/schoen_basketbal.png' alt='Basketbalschoenen'>
      <div class='card-body'>
        <div class='price'>€70,00</div>
      </div>
    </div>

    <div class='card honkbal'>
      <div class='card-header'>Honkbal</div>
      <img src='images/schoen_honkbal.png' alt='Honkbalschoenen'>
      <div class='card-body'>
        <div class='price'>€100,00</div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
