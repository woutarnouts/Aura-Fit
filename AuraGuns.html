<html><head><meta charset='utf-8'><title>AuraGun</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f7f7f7}
header{background:white;padding:20px;text-align:center;border-bottom:1px solid #ddd}
nav a{margin:0 10px;color:#1e3a8a;text-decoration:none}
.container{max-width:1200px;margin:auto;padding:20px}
h2{text-align:center;color:#1e3a8a;margin-bottom:30px}
table{border-collapse:collapse;width:100%;background:white;margin-bottom:40px}
td,th{border:1px solid #ddd;padding:10px;text-align:left}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:white;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,.1);overflow:hidden;text-align:center}
.card-header{padding:14px;color:white;font-weight:bold;font-size:1.1em}
.card img{width:100%;height:220px;object-fit:contain;background:#f5f5f5;padding:10px;box-sizing:border-box}

.xs .card-header{background:#111827} .xs{border-top:4px solid #111827}
.s  .card-header{background:#1f2937} .s {border-top:4px solid #1f2937}
.m  .card-header{background:#0f766e} .m {border-top:4px solid #0f766e}
.l  .card-header{background:#9ca3af} .l {border-top:4px solid #9ca3af}
.xl .card-header{background:#374151} .xl{border-top:4px solid #374151}
</style>
</head>
<body>
<header><h1>AuraGun</h1><nav><a href='index.html'>← Terug naar home</a></nav></header>
<div class='container'>
<h2>Varianten</h2>

<table>
<tr><th>Variant</th><th>Prijs</th></tr>
<tr><td>XS</td><td>€40,00</td></tr>
<tr><td>S</td><td>€60,00</td></tr>
<tr><td>M</td><td>€80,00</td></tr>
<tr><td>L</td><td>€120,00</td></tr>
<tr><td>XL</td><td>€180,00</td></tr>
</table>

<div class='grid'>
  <div class='card xs'>
    <div class='card-header'>XS</div>
    <img src='images/auragun_xs.png' alt='AuraGun XS'>
  </div>
  <div class='card s'>
    <div class='card-header'>S</div>
    <img src='images/auragun_s.png' alt='AuraGun S'>
  </div>
  <div class='card m'>
    <div class='card-header'>M</div>
    <img src='images/auragun_m.png' alt='AuraGun M'>
  </div>
  <div class='card l'>
    <div class='card-header'>L</div>
    <img src='images/auragun_l.png' alt='AuraGun L'>
  </div>
  <div class='card xl'>
    <div class='card-header'>XL</div>
    <img src='images/auragun_xl.png' alt='AuraGun XL'>
  </div>
</div>

</div>
</body></html>
</body>
</html>
