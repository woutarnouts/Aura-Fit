<!DOCTYPE html>
<html>
<head>
  <meta charset='utf-8'>
  <title>Aurafit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f7f7f7; color: #111; }

    header {
      background: #0a0a0a;
      padding: 12px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #1e3a8a;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo span { color: white; font-size: 1.6em; font-weight: bold; letter-spacing: 4px; }
    nav a { margin: 0 12px; color: #aab4d4; text-decoration: none; font-weight: bold; }
    nav a:hover { color: white; }

    .cart-btn {
      background: #1e3a8a;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
      position: relative;
    }
    .cart-btn .badge {
      background: #e11d48;
      color: white;
      border-radius: 50%;
      font-size: 0.7em;
      padding: 2px 6px;
      position: absolute;
      top: -6px;
      right: -6px;
    }

    .cart-overlay {
      display: none;
      position: fixed;
      top: 0; right: 0;
      width: 350px;
      height: 100%;
      background: white;
      box-shadow: -4px 0 20px rgba(0,0,0,0.2);
      z-index: 200;
      padding: 24px;
      overflow-y: auto;
    }
    .cart-overlay.open { display: block; }
    .cart-overlay h2 { color: #1e3a8a; margin-bottom: 20px; }
    .cart-close { float: right; background: none; border: none; font-size: 1.5em; cursor: pointer; color: #888; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; gap: 8px; }
    .cart-item span { font-size: 0.9em; flex: 1; }
    .cart-item button { background: #e11d48; color: white; border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; }
    .cart-total { margin-top: 20px; font-weight: bold; font-size: 1.1em; text-align: right; }
    .cart-checkout { display: block; width: 100%; margin-top: 16px; background: #1e3a8a; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 1em; cursor: pointer; }
    .cart-empty { color: #888; text-align: center; margin-top: 40px; }

    .hero { background: #0a0a0a; color: white; padding: 80px 20px; text-align: center; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at center, #1e3a8a55 0%, transparent 70%); }
    .hero-content { position: relative; z-index: 1; }
    /* Styling voor het enige logo in de banner */
    .hero img { height: 120px; width: auto; object-fit: contain; margin-bottom: 20px; }
    .hero h1 { font-size: 2.5em; margin-bottom: 16px; letter-spacing: 4px; }
    .hero p { font-size: 1.2em; margin-bottom: 30px; opacity: 0.8; }
    .btn { background: #1e3a8a; color: white; padding: 14px 28px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 1em; border: 2px solid #3b82f6; }
    .btn:hover { background: #1e40af; }

    #producten { padding: 50px 20px; }
    #producten h2 { text-align: center; color: #1e3a8a; font-size: 1.8em; margin-bottom: 30px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; max-width: 1200px; margin: auto; }
    .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; transition: transform 0.2s; }
    .card:hover { transform: translateY(-4px); }
    .card-top { background: #0a0a0a; color: white; padding: 24px 20px; text-align: center; font-size: 1.3em; font-weight: bold; letter-spacing: 1px; text-decoration: none; display: block; border-bottom: 3px solid #1e3a8a; }
    .card-body { padding: 16px; }
    .card-body p { color: #555; margin: 4px 0; font-size: 0.95em; }
    .variant-select { width: 100%; margin-top: 12px; padding: 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95em; color: #111; }
    .add-to-cart { display: block; width: 100%; margin-top: 10px; background: #1e3a8a; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 0.95em; }
    .add-to-cart:hover { background: #1e40af; }

    footer { background: #0a0a0a; color: #aab4d4; text-align: center; padding: 30px; margin-top: 60px; font-size: 0.9em; }
  </style>
</head>
<body>

<header>
  <div class='header-logo'>
