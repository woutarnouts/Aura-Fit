<!DOCTYPE html>
<html>
<head>
  <meta charset='utf-8'>
  <title>Aurafit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f7f7f7; color: #111; }

    header {
      background: #0a0a0a;
      padding: 12px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #1e3a8a;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    /* Zorgt ervoor dat je logo mooi schaalt in de header */
    .header-logo img { height: 50px; width: auto; object-fit: contain; }
    .header-logo span { color: white; font-size: 1.6em; font-weight: bold; letter-spacing: 4px; }
    nav a { margin: 0 12px; color: #aab4d4; text-decoration: none; font-weight: bold; }
    nav a:hover { color: white; }

    .cart-btn {
      background: #1e3a8a;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
      position: relative;
    }
    .cart-btn .badge {
      background: #e11d48;
      color: white;
      border-radius: 50%;
      font-size: 0.7em;
      padding: 2px 6px;
      position: absolute;
      top: -6px;
      right: -6px;
    }

    .cart-overlay {
      display: none;
      position: fixed;
      top: 0; right: 0;
      width: 350px;
      height: 100%;
      background: white;
      box-shadow: -4px 0 20px rgba(0,0,0,0.2);
      z-index: 200;
      padding: 24px;
      overflow-y: auto;
    }
    .cart-overlay.open { display: block; }
    .cart-overlay h2 { color: #1e3a8a; margin-bottom: 20px; }
    .cart-close { float: right; background: none; border: none; font-size: 1.5em; cursor: pointer; color: #888; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; gap: 8px; }
    .cart-item span { font-size: 0.9em; flex: 1; }
    .cart-item button { background: #e11d48; color: white; border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; }
    .cart-total { margin-top: 20px; font-weight: bold; font-size: 1.1em; text-align: right; }
    .cart-checkout { display: block; width: 100%; margin-top: 16px; background: #1e3a8a; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 1em; cursor: pointer; }
    .cart-empty { color: #888; text-align: center; margin-top: 40px; }

    .hero { background: #0a0a0a; color: white; padding: 80px 20px; text-align: center; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at center, #1e3a8a55 0%, transparent 70%); }
