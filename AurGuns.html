<!DOCTYPE html>
<html>
<head>
  <meta charset='utf-8'>
  <title>AuraGun - Varianten</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f7f7f7; }
    header { background: white; padding: 20px; text-align: center; border-bottom: 1px solid #ddd; }
    nav a { margin: 0 10px; color: #1e3a8a; text-decoration: none; }
    .container { max-width: 1200px; margin: auto; padding: 30px; }
    h2 { text-align: center; color: #1e3a8a; margin-bottom: 30px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 24px;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      text-align: center;
      transition: transform 0.2s;
    }

    .card:hover { transform: translateY(-4px); }

    .card-header {
      padding: 14px;
      color: white;
      font-weight: bold;
      font-size: 1.2em;
      letter-spacing: 1px;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: contain;
      display: block;
      padding: 16px;
      box-sizing: border-box;
      background: #f5f5f5;
    }

    .card-body {
      padding: 16px;
    }

    .card-body .price {
      font-size: 1.3em;
      font-weight: bold;
      margin-top: 6px;
    }

    /* Kleuren per model */
    .xs  { border-top: 4px solid #374151; }
    .s   { border-top: 4px solid #e5e7eb; }
    .m   { border-top: 4px solid #0f766e; }
    .l   { border-top: 4px solid #1f2937; }
    .xl  { border-top: 4px solid #111827; }

    .xs  .card-header { background: #374151; }
    .s   .card-header { background: #9ca3af; }
    .m   .card-header { background: #0f766e; }
    .l   .card-header { background: #1f2937; }
    .xl  .card-header { background: #111827; }

    .xs  .price { color: #374151; }
    .s   .price { color: #9ca3af; }
    .m   .price { color: #0f766e; }
    .l   .price { color: #1f2937; }
    .xl  .price { color: #111827; }

    .badge {
      display: inline-block;
      background: #1e3a8a;
      color: white;
      font-size: 0.75em;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 6px;
    }

    .xl .badge { background: #b45309; }
  </style>
</head>
<body>

<header>
  <h1>AuraGun</h1>
  <nav><a href='index.html'>← Terug naar home</a></nav>
</header>

<div class='container'>
  <h2>Massagepistolen</h2>
  <div class='grid'>

    <div class='card xs'>
      <div class='card-header'>XS</div>
      <img src='images/auragun_xs.png' alt='AuraGun XS'>
      <div class='card-body'>
        <div class='price'>€40,00</div>
      </div>
    </div>

    <div class='card s'>
      <div class='card-header'>S</div>
      <img src='images/auragun_s.png' alt='AuraGun S'>
      <div class='card-body'>
        <div class='price'>€60,00</div>
      </div>
    </div>

    <div class='card m'>
      <div class='card-header'>M</div>
      <img src='images/auragun_m.png' alt='AuraGun M'>
      <div class='card-body'>
        <div class='price'>€80,00</div>
      </div>
    </div>

    <div class='card l'>
      <div class='card-header'>L</div>
      <img src='images/auragun_l.png' alt='AuraGun L'>
      <div class='card-body'>
        <div class='price'>€120,00</div>
      </div>
    </div>

    <div class='card xl'>
      <div class='card-header'>XL</div>
      <img src='images/auragun_xl.png' alt='AuraGun XL'>
      <div class='card-body'>
        <div class='badge'>⭐ Bestseller</div>
        <div class='price'>€180,00</div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
